<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <h1>Project Upload Form</h1>
    <div class="container my-40">
        <form th:action="@{/project-submit}" method="post" th:object="${projectDTO}"  class="row g-3">
            <div class="col-12">
                <label for="name" class="form-label">Project Name</label>
                <input type="text" class="form-control" id="name" placeholder="Road Construction" th:field="*{name}">
            </div>
            <div class="col-12">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" placeholder="10 Downing Street" th:field="*{location}">
            </div>
            <div class="col-12">
                <label for="department" class="form-label">Owner Department</label>
                <select id="department" class="form-select" th:field="*{departmentid}" required >
                    <option value="" selected >Select a Department</option>
                    <option value="1">Department of Health</option>
                    <option value="2">Water Department</option>
                    <option value="3">Department of Garbage Collection</option>
                    <option value="4">Public Works Department</option>
                </select>
            </div>
            <div class="col-12">
                <label for="start-date" class="form-label">Start Date</label>
                <input type="date" class="form-control" id="start-date"  th:field="*{startDate}">
            </div>
            <div class="col-12">
                <label for="end-date" class="form-label">Expected End Date</label>
                <input type="date" class="form-control" id="end-date"  th:field="*{endDate}">
            </div>
            <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea class="form-control" id="description"  th:field="*{description}" placeholder="Give a brief description of the project">Description</textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Upload</button>
            </div>
        </form>
    </div>
</body>
</html>
