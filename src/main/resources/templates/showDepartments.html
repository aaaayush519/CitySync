<!doctype html>
<html  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Departments</title>
</head>
<body>
<table class="table">
  <thead>
    <tr>
      <th scope="col">Department Id</th>
      <th scope="col">Department Name</th>
      <th scope="col">Department Description</th>
      <th scope="col">Department Contact No.</th>
    </tr>
  </thead>
    <tbody>
    <div th:replace="fragments/nav :: navbar"></div>
        <th:block th:each="department : ${departments}">
            <tr>
                <td scope="col" th:text="${department.id}"></td>
                <td scope="col" th:text="${department.name}"></td>
                <td scope="col" th:text="${department.description}"></td>
                <td scope="col" th:text="${department.phoneNumber}"></td>
            </tr>
        </th:block>
    </tbody>
</table>
</body>
</html>
