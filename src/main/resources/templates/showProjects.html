<!doctype html>
<html  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Departments</title>
</head>
<body>
<table class="table">
  <thead>
    <tr>
      <th scope="col">Project Name</th>
      <th scope="col">Department Name</th>
      <th scope="col">Project Location</th>
      <th scope="col">Project Description</th>
      <th scope="col">Project Start Date</th>
      <th scope="col">Project End Date</th>
    </tr>
  </thead>
    <tbody>
        <th:block th:each="project : ${allProjects}">
            <tr>
                <td scope="col" th:text="${project.projectName}"></td>
                <td scope="col" th:text="${project.departmentName}"></td>
                <td scope="col" th:text="${project.location}"></td>
                <td scope="col" th:text="${project.description}"></td>
                <td scope="col" th:text="${project.startDate}"></td>
                <td scope="col" th:text="${project.endDate}"></td>
            </tr>
        </th:block>
    </tbody>
</table>
</body>
</html>
