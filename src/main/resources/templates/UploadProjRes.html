<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <h1>Project & Resource Upload Form</h1>
    <div class="container my-40">
        <form th:action="@{/project-submit}" method="post" th:object="${projResDTO}"  class="row g-3">
            <div class="col-6">
                <label for="projectName" class="form-label">Project Name</label>
                <input type="text" class="form-control" id="projectName" placeholder="Road Construction" th:field="*{projectName}">
            </div>
            <div class="col-12">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" placeholder="10 Downing Street" th:field="*{location}">
            </div>
            <div class="col-6">
                <label for="department" class="form-label">Owner Department</label>
                <select id="department" class="form-select" th:field="*{departmentid}" required >
                    <option value="" selected >Select a Department</option>
                    <option value="1">Department of Health</option>
                    <option value="2">Water Department</option>
                    <option value="3">Department of Garbage Collection</option>
                    <option value="4">Public Works Department</option>
                </select>
            </div>
            <div class="col-6">
                <label for="start-date" class="form-label">Project Start Date</label>
                <input type="date" class="form-control" id="start-date"  th:field="*{startDate}">
            </div>
            <div class="col-6">
                <label for="end-date" class="form-label">Expected End Date</label>
                <input type="date" class="form-control" id="end-date"  th:field="*{endDate}">
            </div>
            <div class="col-12">
                <label for="projDescription" class="form-label">Project Description</label>
                <textarea class="form-control" id="projDescription"  th:field="*{projDescription}" placeholder="Give a brief description of the project">Description</textarea>
            </div>

                <!--RESOURCE-->
    <div id="resource-container">
        <div class="col-6">
            <label for="resourceName" class="form-label">Resource Name</label>
            <input type="text" class="form-control" id="resourceName" placeholder="Iron Rods ,Cement...." th:field="*{resourceName}">
        </div>

        <div class="col-6">
            <label for="quantity" class="form-label">Resource Quantity</label>
            <input type="text" class="form-control" id="quantity" placeholder="100kgs, 50 tonnes" th:field="*{quantity}">
        </div>

        <div class="col-12">
            <label for="resDescription" class="form-label">Resource Description</label>
            <textarea class="form-control" id="resDescription"  th:field="*{resDescription}" placeholder="Give a brief description of the project">Description</textarea>
        </div>

    </div>
            <div class="col-6">
                <button type="submit" id="addResource" class="btn btn-primary">Add Resource</button>
            </div>
            <div class="col-6">
                <button type="submit" class="btn btn-primary">Upload</button>
            </div>
        </form>
    </div>


    <script>
        document.getElementById('addResource').addEventListener('click', function() {
            const resourceContainer = document.getElementById('resource-container');

            // Create a new div for the new person entry
            const newResourceEntry = document.createElement('div');
            newResourceEntry.className = 'resource-entry';
            newResourceEntry.innerHTML = `
        <div class="col-6">
            <label for="resourceName[]" class="form-label">Resource Name</label>
            <input type="text" class="form-control" id="resourceName[]" placeholder="Iron Rods ,Cement...." th:field="*{resourceName}">
        </div>

        <div class="col-6">
            <label for="quantity[]" class="form-label">Resource Quantity</label>
            <input type="text" class="form-control" id="quantity[]" placeholder="100kgs, 50 tonnes" th:field="*{quantity}">
        </div>

        <div class="col-12">
            <label for="resDescription[]" class="form-label">Resource Description</label>
            <textarea class="form-control" id="resDescription[]"  th:field="*{resDescription}" placeholder="Give a brief description of the project">Description</textarea>
        </div>
            `;

            // Append the new entry to the container
            resourceContainer.appendChild(newResourceEntry);
        });
    </script>


</body>
</html>
