<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/css/style.css}" />
</head>

<body>
<h1 style="justify-content: center">Department Registration Form</h1>

<div class="container my-40">
    <form th:action="@{/admin/add-department}" method="post" th:object="${departmentdto}" class="row g-3">
        <div class="col-12">
            <label for="name" class="form-label">Department Name</label>
            <input type="text" class="form-control" id="name" placeholder="Public Works Department , Department of Electricity" th:field="*{name}">
        </div>

        <div class="col-12">
            <label for="description" class="form-label">Description</label>
            <input type="text" class="form-control" id="description" placeholder="Services offered" th:field="*{description}">
        </div>
        <div class="col-12">
            <label for="phoneNo" class="form-label">Contact Number</label>
            <input type="tel" class="form-control" id="phoneNo" placeholder="Phone Number" th:field="*{phoneNumber}">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Add Department</button>
        </div>
    </form>
</div>
</body>

</html>
