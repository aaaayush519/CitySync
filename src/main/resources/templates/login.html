<!doctype html>
<html lang="en" xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <title>Login</title>
</head>
<body>
<div th:replace="fragments/nav :: navbar"></div>
<div class="container my-40">
    <form th:action="@{/login}" method="post">




        <div class="form-group">
            <label for="username">Username</label>
            <input type="text"  class="form-control" id="username"  placeholder="Enter username"  name="username">
            <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
        </div>
        <div class="form-group">
            <label for="exampleInputPassword1">Password</label>
            <input type="password"  class="form-control" id="exampleInputPassword1" placeholder="Password"  name="password">
        </div>
        <div class="form-group form-check">
            <input type="checkbox" class="form-check-input" id="exampleCheck1">
            <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>

        <label  class="btn btn-outline-primary" id="admin">
            <a th:href="@{/admin}" style="color: inherit; text-decoration: none;">Sign in as admin</a>
        </label>
        <label  class="btn btn-outline-primary" id="role">
            <a th:href="@{/user}" style="color: inherit; text-decoration: none;">Sign in as user</a>
        </label>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>
<script>
    document.getElementById("admin").onclick = function (){
        this.classList.remove('btn-outline-primary');
        this.classList.add('btn-primary');
    };
</script>
</body>
</html>
