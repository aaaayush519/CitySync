<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
<div th:replace="fragments/nav-admin :: navbar-admin"></div>
<h1 style="justify-content: center">Department Registration Form</h1>

<div class="container my-40">
    <form th:action="@{/admin/add-department}" method="post" th:object="${departmentdto}" class="row g-3">
        <div class="col-12">
            <label for="name" class="form-label">Department Name</label>
            <input type="text" class="form-control" id="name"
                   placeholder="Public Works Department , Department of Electricity" th:field="*{name}">
        </div>

        <div class="col-12">
            <label for="description" class="form-label">Description</label>
            <input type="text" class="form-control" id="description" placeholder="Services offered"
                   th:field="*{description}">
        </div>
        <div class="col-12">
            <label for="phoneNo" class="form-label">Contact Number</label>
            <input type="tel" class="form-control" id="phoneNo" placeholder="Phone Number" th:field="*{phoneNumber}">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Add Department</button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>

</html>
