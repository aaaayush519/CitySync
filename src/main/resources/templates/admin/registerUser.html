<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
<div th:replace="fragments/nav-admin :: navbar-admin"></div>
<h1 style="justify-content: center">Registration Form</h1>

<div class="container my-40">
    <form th:action="@{/admin/add-user}" method="post" th:object="${csuserDto}" class="row g-3">
        <div class="col-12">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" placeholder="Cillian Murphy" th:field="*{name}">
        </div>

        <div class="col-12">
            <label for="department" class="form-label">Department</label>
            <select id="department" class="form-select" th:field="*{departmentid}" required>
                <option value="" selected>Select a Department</option>
                <th:block th:each="department : ${departments}">
                    <option th:value="${department.id}" th:text="${department.name}">Public Works Department</option>
                </th:block>
            </select>
        </div>
        <div class="col-12">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="example@gmail.com" th:field="*{email}">
        </div>
        <div class="col-12">
            <label for="role" class="form-label">Role</label>
            <input type="text" class="form-control" id="role" placeholder="Admin,User" th:field="*{role}">
        </div>
        <div class="col-12">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="password" th:field="*{password}">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Sign in</button>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>

</html>
