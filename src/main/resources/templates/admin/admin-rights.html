<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registration and Login System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
<div th:replace="fragments/nav-admin :: navbar-admin"></div>

<div class="container">
    <div class="row">
        <h1 class="text-center"> Administrator rights </h1>
    </div>
    <button type="button" class="btn btn-primary">
        <a th:href="@{/admin/register-user}" style="color: inherit; text-decoration: none;">Add User</a>
    </button>

    <button type="button" class="btn btn-primary">
        <a th:href="@{/user/project/upload}" style="color: inherit; text-decoration: none;">Add Project</a>
    </button>

    <button type="button" class="btn btn-primary">
        <a th:href="@{/user/meetings/upload}" style="color: inherit; text-decoration: none;">Add Meetings</a>
    </button>
    <button type="button" class="btn btn-primary">
        <a th:href="@{/user/showDepartments}" style="color: inherit; text-decoration: none;">Show Departments</a>
    </button>
    <button type="button" class="btn btn-primary">
        <a th:href="@{/admin/showUsers}" style="color: inherit; text-decoration: none;">Show Users</a>
    </button>
    <button type="button" class="btn btn-primary">
        <a th:href="@{/admin/register-department}" style="color: inherit; text-decoration: none;">Add
            Departments</a>
    </button>
    <button type="button" class="btn btn-primary">
        <a th:href="@{/user/project/showProjects}" style="color: inherit; text-decoration: none;">Show All
            Projects</a>
    </button>
    <button type="button" class="btn btn-primary">
        <a th:href="@{/admin/showAllMessages}" style="color: inherit; text-decoration: none;">Show All Messages</a>
    </button>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
</body>

</html>
