<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/css/style.css}"/>
</head>

<body>
<h1 style="justify-content: center">Schedule Meetings</h1>

<div class="container my-40">
    <form th:action="@{/meeting-submit}" method="post" th:object="${meetingsDTO}" class="row g-3" id="form">
        <div class="col-12">
            <label for="name" class="form-label">Meeting Venue</label>
            <input type="text" class="form-control" id="name" placeholder="Cillian Murphy" th:field="*{location}">
        </div>


        <div class="col-12">
            <label for="projectId" class="form-label">Project Id</label>
            <input type="text" class="form-control" id="projectId" placeholder="Admin,User" th:field="*{projectId}">
        </div>

        <div class="col-12">
            <label for="agenda" class="form-label">Agenda</label>
            <input type="text" class="form-control" id="agenda" placeholder="Admin,User" th:field="*{agenda}">
        </div>
        <div class="col-12">
            <label for="addedBy" class="form-label">Added By</label>
            <input type="text" class="form-control" id="addedBy" placeholder="Admin/User" th:field="*{addedBy}">
        </div>

        <div class="col-6">
            <label for="end-date" class="form-label">Expected End Date</label>
            <input type="date" class="form-control" id="end-date" th:field="*{meetingDate}">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Sign in</button>
        </div>

        <div class="col-6">
            <label for="department" class="form-label">Owner Department</label>
            <select id="department" class="form-select" th:field="*{participatingDepartments[0].departments}" required>
                <option value="" selected>Select a Department</option>
                <option value="1">Department of Health</option>
                <option value="2">Water Department</option>
                <option value="3">Department of Garbage Collection</option>
                <option value="4">Public Works Department</option>
            </select>
        </div>

    </form>
</div>


<script>
        let a = 1;
        let form = document.getElementById('form');
        let newDiv = document.createElement('div');
        let newlabel = document.createElement('label');
        let newselect = document.createElement('select');


</script>
</body>

</html>
