<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/css/style.css}" />
</head>

<body>
<div th:replace="fragments/nav :: navbar"></div>
<h1 style="justify-content: center">Schedule Meetings</h1>

<div class="container my-40">
    <form th:action="@{/user/meetings/submit}" method="post" th:object="${meetingsDTO}" class="row g-3" id="form">
        <div class="col-12">
            <label for="name" class="form-label">Meeting Venue</label>
            <input type="text" class="form-control" id="name" placeholder="Cillian Murphy" th:field="*{location}">
        </div>


        <div class="col-12">
            <label for="projectId" class="form-label">Project Id</label>
            <input type="text" class="form-control" id="projectId" placeholder="Admin,User" th:field="*{projectId}">
        </div>

        <div class="col-12">
            <label for="agenda" class="form-label">Agenda</label>
            <input type="text" class="form-control" id="agenda" placeholder="Admin,User" th:field="*{agenda}">
        </div>
        <div class="col-12">
            <label for="addedBy" class="form-label">Added By</label>
            <input type="text" class="form-control" id="addedBy" placeholder="Admin/User" th:field="*{addedBy}">
        </div>

        <div class="col-6">
            <label for="end-date" class="form-label">Meeting Date</label>
            <input type="date" class="form-control" id="end-date" th:field="*{meetingDate}">
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Sign in</button>
        </div>


        <div class="col-6">
            <label for="department1" class="form-label">Participating Department</label>
            <select id="department1" class="form-select" name="participatingDeptId[0]" required>
                <option value="" selected>Select a Department</option>
                <option value="1">Department of Health</option>
                <option value="2">Water Department</option>
                <option value="3">Department of Garbage Collection</option>
                <option value="4">Public Works Department</option>
            </select>
        </div>
        <button type="button" id="add-dept-btn">Add Department</button>
    </form>
</div>


<script>
    let a = 1;
    document.getElementById('add-dept-btn').addEventListener('click', function () {
        console.log("Hello World");
        const form = document.getElementById('form');
        const newDiv = document.createElement('div');
        const newLabel = document.createElement('label')
        newLabel.textContent = "Participating Department";
        newDiv.classList.add('col-12');
        const newSelect = document.createElement('select');
        newSelect.name = `participatingDeptId[${a}]`;
        //newSelect.setAttribute('th:field', `*{participatingDeptId[${a}]}`);
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.textContent = "Select a Department";
        defaultOption.selected = true;

        const departments = [
            { value: '1', text: 'Department of Health' },
            { value: '2', text: 'Water Department' },
            { value: '3', text: 'Department of Garbage Collection' },
            { value: '4', text: 'Public Works Department' }
        ];
        newSelect.appendChild(defaultOption);
        departments.forEach(department => {
            const option = document.createElement('option');
            option.value = department.value;
            option.textContent = department.text;
            newSelect.appendChild(option);
        })
        newDiv.appendChild(newLabel);
        newDiv.appendChild(newSelect);
        form.appendChild(newDiv);
        a++;
    });

</script>
</body>

</html>
