<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
  <meta charset="UTF-8">
  <title>Registration and Login System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
</head>
<body>
<div th:replace="fragments/nav :: navbar"></div>

<br /><br />
<div class="container">
  <div class="row">
    <h1 class="text-center"> User rights </h1>
  </div>
  <button type="button" class="btn btn-primary">
    <a th:href="@{/user/project/upload}" style="color: inherit; text-decoration: none;">Add Project</a>
  </button>
  <button type="button" class="btn btn-primary">
    <a th:href="@{/user/meetings/upload}" style="color: inherit; text-decoration: none;">Add Meetings</a>
  </button>
  <button type="button" class="btn btn-primary">
    <a th:href="@{/user/showDepartments}" style="color: inherit; text-decoration: none;">Show Departments</a>
  </button>
  <button type="button" class="btn btn-primary">
    <a th:href="@{/user/project/myProjects}" style="color: inherit; text-decoration: none;">My Projects</a>
  </button>
  <button type="button" class="btn btn-primary">
    <a th:href="@{/user/showMyMessages}" style="color: inherit; text-decoration: none;">Show Pending Projects</a>
  </button>
  <button type="button" class="btn btn-primary">
    <a th:href="@{/user/ApprovedMessages}" style="color: inherit; text-decoration: none;">Show Approved Projects</a>
  </button>
</div>
</body>
</html>
